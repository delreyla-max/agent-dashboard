<!DOCTYPE html>
<!-- MANAGER: regenerate the JSON inside #dashboard-data from dashboard-data.json after each task event -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Manager Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#222635; --border:#2e3248;
    --text:#e2e8f0; --muted:#8892a4; --amber:#f59e0b; --green:#22c55e;
    --red:#ef4444; --gray:#6b7280; --purple:#a855f7; --blue:#3b82f6;
    --teal:#14b8a6; --overlay-z:10;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:14px; line-height:1.5; min-height:100vh; }
  .page { max-width:1100px; margin:0 auto; padding:28px 20px 60px; }
  header { display:flex; align-items:center; flex-wrap:wrap; gap:14px; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  header h1 { font-size:22px; font-weight:700; letter-spacing:-0.3px; flex:1 1 auto; }
  .updated { color:var(--muted); font-size:12px; white-space:nowrap; }
  .plan-badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:0.05em; background:#312e81; color:#a5b4fc; border:1px solid #4338ca; }
  .pill-wrap { display:flex; align-items:center; gap:10px; }
  .pill { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:background 0.2s,color 0.2s; user-select:none; }
  .pill.on { background:#15803d; color:#bbf7d0; } .pill.off { background:#374151; color:#9ca3af; }
  .pill-dot { width:8px; height:8px; border-radius:50%; }
  .pill.on .pill-dot { background:#86efac; } .pill.off .pill-dot { background:#6b7280; }
  .pill-hint { font-size:11px; color:var(--muted); }
  #save-banner { display:none; background:#1e293b; border:1px solid #334155; color:#94a3b8; font-size:12px; padding:7px 14px; border-radius:6px; margin-bottom:16px; }
  #save-banner.visible { display:block; }
  #disabled-overlay { display:none; position:fixed; inset:0; z-index:var(--overlay-z); background:rgba(10,11,18,0.88); justify-content:center; align-items:center; flex-direction:column; gap:12px; }
  #disabled-overlay.visible { display:flex; }
  #disabled-overlay .off-icon { font-size:48px; opacity:0.5; }
  #disabled-overlay p { font-size:18px; color:var(--muted); }
  .section-header { font-size:15px; font-weight:700; margin:28px 0 14px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .token-budget-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:24px; }
  .token-budget-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:4px; }
  .token-budget-disclaimer { font-size:11px; color:var(--muted); margin-bottom:16px; line-height:1.4; }
  .meter-row { display:grid; grid-template-columns:110px 1fr 90px 130px; align-items:center; gap:12px; margin-bottom:12px; }
  .meter-row:last-child { margin-bottom:0; }
  .meter-label { font-size:12px; font-weight:600; color:var(--text); }
  .meter-track { height:10px; border-radius:999px; background:var(--surface2); overflow:hidden; border:1px solid var(--border); min-width:0; }
  .meter-fill { height:100%; border-radius:999px; transition:width 0.4s ease; }
  .meter-fill.green { background:#22c55e; } .meter-fill.amber { background:#f59e0b; } .meter-fill.red { background:#ef4444; }
  .meter-numbers { font-size:11px; color:var(--muted); font-family:monospace; white-space:nowrap; text-align:right; }
  .meter-reset { font-size:11px; color:var(--muted); white-space:nowrap; }
  @media (max-width:600px) { .meter-row { grid-template-columns:1fr 1fr; grid-template-rows:auto auto; gap:6px 10px; } .meter-track { grid-column:1/-1; } .meter-reset { text-align:right; } }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .card-label { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:6px; }
  .card-value { font-size:26px; font-weight:700; }
  .card-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; background:var(--surface); }
  thead th { background:var(--surface2); text-align:left; padding:11px 14px; font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); } tbody tr:last-child { border-bottom:none; } tbody tr:hover { background:var(--surface2); }
  tbody td { padding:11px 14px; vertical-align:middle; }
  .col-title { font-weight:500; } .col-tokens { font-family:monospace; font-size:12px; color:var(--muted); }
  .col-date { font-size:12px; color:var(--muted); white-space:nowrap; }
  .col-result a { color:var(--blue); text-decoration:none; font-size:12px; } .col-result a:hover { text-decoration:underline; }
  .col-result .none { color:var(--muted); font-size:12px; }
  .badge { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; white-space:nowrap; }
  .badge-pending { background:#374151; color:#9ca3af; }
  .badge-in_progress { background:#451a03; color:#fcd34d; border:1px solid #92400e; }
  .badge-done { background:#052e16; color:#86efac; border:1px solid #166534; }
  .badge-blocked { background:#450a0a; color:#fca5a5; border:1px solid #991b1b; }
  .badge-ok { background:#052e16; color:#86efac; border:1px solid #166534; }
  .badge-failed { background:#450a0a; color:#fca5a5; border:1px solid #991b1b; }
  .mbadge { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; white-space:nowrap; }
  .mbadge-fable { background:#3b0764; color:#d8b4fe; border:1px solid #6b21a8; }
  .mbadge-sonnet { background:#1e3a8a; color:#93c5fd; border:1px solid #1d4ed8; }
  .mbadge-haiku { background:#042f2e; color:#5eead4; border:1px solid #0f766e; }
  .mbadge-other { background:#1f2937; color:#9ca3af; }
  .pipeline-cards { display:flex; flex-direction:column; gap:16px; }
  .pipeline-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
  .pipeline-card-header { display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
  .pipeline-title { font-size:15px; font-weight:700; flex:1 1 auto; }
  .pipeline-meta { font-size:12px; color:var(--muted); }
  .pipeline-enabled-dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:3px; }
  .pipeline-enabled-dot.on { background:#22c55e; box-shadow:0 0 4px #22c55e80; } .pipeline-enabled-dot.off { background:#6b7280; }
  .pipeline-run-note { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }
  .pipeline-section-label { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-top:14px; margin-bottom:6px; font-weight:600; }
  .pipeline-docs { list-style:none; display:flex; flex-direction:column; gap:4px; }
  .pipeline-docs li { font-size:12px; } .pipeline-docs a { color:var(--blue); text-decoration:none; } .pipeline-docs a:hover { text-decoration:underline; }
  .pipeline-docs .doc-meta { color:var(--muted); margin-left:6px; }
  .pipeline-empty { font-size:12px; color:var(--muted); font-style:italic; }
  .matches-table-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--border); margin-top:6px; }
  .matches-table { width:100%; border-collapse:collapse; background:var(--surface2); font-size:12px; }
  .matches-table th { text-align:left; padding:7px 12px; font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); border-bottom:1px solid var(--border); }
  .matches-table td { padding:7px 12px; border-bottom:1px solid var(--border); } .matches-table tr:last-child td { border-bottom:none; }
  .matches-table a { color:var(--blue); text-decoration:none; } .matches-table a:hover { text-decoration:underline; }
  .score-cell { font-family:monospace; color:var(--amber); }
  footer { margin-top:36px; font-size:11px; color:var(--muted); text-align:center; line-height:1.6; }
  .empty-row td { text-align:center; padding:32px; color:var(--muted); }
</style>
</head>
<body>

<div id="disabled-overlay">
  <div class="off-icon">&#9899;</div>
  <p>Dashboard is disabled</p>
</div>
<div id="save-banner">Dashboard toggled — tell Claude to persist this setting.</div>

<div class="page">
  <header>
    <h1>Agent Manager Dashboard</h1>
    <span class="plan-badge" id="plan-badge"></span>
    <span class="updated" id="dash-updated"></span>
    <div class="pill-wrap">
      <button class="pill" id="toggle-pill" onclick="toggleDashboard()">
        <span class="pill-dot"></span><span id="pill-label">ON</span>
      </button>
      <span class="pill-hint">Toggle tracking</span>
    </div>
  </header>

  <div class="token-budget-section" id="token-section"></div>
  <div class="cards" id="summary-cards"></div>

  <div class="section-header">One-Off Tasks</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Title</th><th>Status</th><th>Model</th><th>Tokens (in / out)</th><th>Date</th><th>Result</th></tr></thead>
      <tbody id="tasks-tbody"></tbody>
    </table>
  </div>

  <div class="section-header">Scheduled Pipelines</div>
  <div class="pipeline-cards" id="pipeline-cards"></div>

  <footer>Agent Manager Dashboard &middot; Fable orchestrates, Sonnet/Haiku execute &middot; Token figures are estimates</footer>
</div>

<script>
(function(){
  var d=JSON.parse(document.getElementById('dashboard-data').textContent);
  var enabled=d.enabled!==false;
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmtK(n){return n?Math.round(n/1000)+'K':'0';}
  function fmtDate(s){if(!s)return '—';var dt=new Date(s);return isNaN(dt)?s:dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
  function badge(s){var m={pending:'badge-pending',in_progress:'badge-in_progress',done:'badge-done',blocked:'badge-blocked',ok:'badge-ok',failed:'badge-failed'};return '<span class="badge '+(m[s]||'badge-pending')+'">'+esc(s.replace('_',' '))+'</span>';}
  function mbadge(m){var c={fable:'mbadge-fable',sonnet:'mbadge-sonnet',haiku:'mbadge-haiku'};return '<span class="mbadge '+(c[m]||'mbadge-other')+'">'+esc(m||'—')+'</span>';}
  function applyEnabled(){document.getElementById('disabled-overlay').classList[enabled?'remove':'add']('visible');}
  function updatePill(){var p=document.getElementById('toggle-pill');p.className='pill '+(enabled?'on':'off');document.getElementById('pill-label').textContent=enabled?'ON':'OFF';}
  window.toggleDashboard=function(){enabled=!enabled;updatePill();applyEnabled();document.getElementById('save-banner').classList.add('visible');};
  document.getElementById('plan-badge').textContent=d.plan||'Pro';
  document.getElementById('dash-updated').textContent='Updated '+fmtDate(d.updated);
  updatePill();applyEnabled();
  var tb=d.tokenBudget;
  if(tb){
    var html='<div class="token-budget-title">Token Budget</div><div class="token-budget-disclaimer">'+(tb.note?esc(tb.note):'Estimates only.')+'</div>';
    [{key:'session'},{key:'week'},{key:'month'}].forEach(function(r){
      var b=tb[r.key];if(!b)return;
      var pct=b.limitEstimate?Math.min(100,Math.round(b.usedEstimate/b.limitEstimate*100)):0;
      var cls=pct>=90?'red':pct>=70?'amber':'green';
      var rst=b.resetsOn?'Resets '+fmtDate(b.resetsOn):(b.windowStarted?'Started '+fmtDate(b.windowStarted):'');
      html+='<div class="meter-row"><div class="meter-label">'+esc(b.label||r.key)+'</div><div class="meter-track"><div class="meter-fill '+cls+'" style="width:'+pct+'%"></div></div><div class="meter-numbers">'+fmtK(b.usedEstimate)+' / '+fmtK(b.limitEstimate)+'</div><div class="meter-reset">'+esc(rst)+'</div></div>';
    });
    document.getElementById('token-section').innerHTML=html;
  }
  var tasks=d.oneOffTasks||[];var pips=d.scheduledPipelines||[];var tots=d.totals||{};
  var done=tasks.filter(function(t){return t.status==='done';}).length;
  var prog=tasks.filter(function(t){return t.status==='in_progress';}).length;
  var blk=tasks.filter(function(t){return t.status==='blocked';}).length;
  var ttok=(tots.fableTokensEstimate||0)+(tots.sonnetTokensEstimate||0)+(tots.haikuTokensEstimate||0);
  document.getElementById('summary-cards').innerHTML=[
    {l:'Total Tasks',v:tasks.length,s:'one-off'},{l:'Done',v:done,s:'completed'},
    {l:'In Progress',v:prog,s:'running'},{l:'Blocked',v:blk,s:'need attention'},
    {l:'Pipelines',v:pips.length,s:'scheduled'},{l:'Total Tokens',v:fmtK(ttok),s:'est. all models'}
  ].map(function(c){return '<div class="card"><div class="card-label">'+esc(c.l)+'</div><div class="card-value">'+esc(String(c.v))+'</div><div class="card-sub">'+esc(c.s)+'</div></div>';}).join('');
  var tb2=document.getElementById('tasks-tbody');
  tb2.innerHTML=tasks.length?tasks.map(function(t){
    var tok=t.tokensEstimate?(fmtK(t.tokensEstimate.input||0)+' / '+fmtK(t.tokensEstimate.output||0)):'—';
    var res=t.resultFile?'<a href="'+esc(t.resultFile)+'" target="_blank">'+esc(t.resultFile)+'</a>':'<span class="none">—</span>';
    return '<tr><td class="col-title">'+esc(t.title)+'</td><td>'+badge(t.status)+'</td><td>'+mbadge(t.model)+'</td><td class="col-tokens">'+tok+'</td><td class="col-date">'+fmtDate(t.started)+'</td><td class="col-result">'+res+'</td></tr>';
  }).join(''):'<tr class="empty-row"><td colspan="6">No tasks yet</td></tr>';
  var pc=document.getElementById('pipeline-cards');
  pc.innerHTML=pips.length?pips.map(function(p){
    var h='<div class="pipeline-card"><div class="pipeline-card-header"><span class="pipeline-enabled-dot '+(p.enabled?'on':'off')+'"></span><span class="pipeline-title">'+esc(p.title)+'</span><span class="pipeline-meta">'+esc(p.schedule||'')+'</span>';
    if(p.lastRun)h+='<span class="pipeline-meta">Last run: '+fmtDate(p.lastRun)+'</span>';
    if(p.lastRunStatus)h+=badge(p.lastRunStatus);
    h+='</div>';
    if(p.lastRunNote)h+='<div class="pipeline-run-note">'+esc(p.lastRunNote)+'</div>';
    if(p.documents&&p.documents.length){
      h+='<div class="pipeline-section-label">Output files</div><ul class="pipeline-docs">';
      p.documents.forEach(function(doc){
        h+='<li><a href="'+esc(doc.path||doc.file)+'" target="_blank">'+esc(doc.file)+'</a>';
        var m=[];if(doc.date)m.push(fmtDate(doc.date));if(doc.total!==undefined)m.push(doc.total+' jobs');if(doc.tier1!==undefined)m.push(doc.tier1+' Tier 1');
        if(m.length)h+='<span class="doc-meta">'+esc(m.join(' · '))+'</span>';
        h+='</li>';
      });
      h+='</ul>';
    } else { h+='<div class="pipeline-empty">No output files yet.</div>'; }
    var ls=p.latestSummary;
    if(ls&&ls.items&&ls.items.length){
      h+='<div class="pipeline-section-label">Latest matches ('+esc(fmtDate(ls.date))+')</div><div class="matches-table-wrap"><table class="matches-table"><thead><tr><th>#</th><th>Score</th><th>Title</th><th>Details</th></tr></thead><tbody>';
      ls.items.forEach(function(item){
        var tc=item.link?'<a href="'+esc(item.link)+'" target="_blank">'+esc(item.title)+'</a>':esc(item.title);
        h+='<tr><td>'+esc(String(item.rank||''))+'</td><td class="score-cell">'+esc(String(item.score||''))+'</td><td>'+tc+'</td><td>'+esc(item.company||'')+'</td></tr>';
      });
      h+='</tbody></table></div>';
    }
    h+='</div>';return h;
  }).join(''):'<div style="color:var(--muted);font-size:13px;padding:12px 0;">No scheduled pipelines configured.</div>';
})();
</script>
</body>
</html>
